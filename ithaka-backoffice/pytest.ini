[pytest]
# Configuración de pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    slow: tests que tardan más tiempo
    integration: tests de integración
    unit: tests unitarios
    smoke: tests básicos de smoke testing

# Coverage (usar con: pytest --cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */conftest.py
    */__init__.py
    */main.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
